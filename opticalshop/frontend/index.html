<!DOCTYPE html>
<html>
<head>
    <title>Optical Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Optical Shop Management</h1>

<h2>Add Product</h2>
<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">
<button onclick="addProduct()">Add</button>

<h2>Buy Product</h2>
<input id="bname" placeholder="Product Name">
<input id="qty" placeholder="Quantity">
<button onclick="buyProduct()">Buy</button>

<h2>Products</h2>
<button onclick="getProducts()">Load Products</button>
<pre id="output"></pre>

<script src="app.js"></script>
</body>
</html>
